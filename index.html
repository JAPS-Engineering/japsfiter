<!doctype html>
<html lang="es" data-dir="a">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Japsfiter · Gasfitería a domicilio sin dramas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter+Tight:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#f4f1ea">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f4f1ea"/>
    <rect x="300" y="250" width="600" height="300" rx="40" fill="#0b3b8c"/>
    <g transform="translate(600 400)" fill="none" stroke="#f5a623" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 -80 a60 60 0 1 1 -60 60 l-90 90 30 30 90 -90 a60 60 0 0 0 30 -90 z"/>
    </g>
    <text x="600" y="640" font-family="Georgia, serif" font-size="72" font-weight="500" text-anchor="middle" fill="#0f1115" letter-spacing="-2">japsfiter</text>
  </svg>
</template>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/services.jsx"></script>
<script type="text/babel" src="components/agendar.jsx"></script>
<script type="text/babel" src="components/nosotros.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "b",
  "accent": "#F5A623",
  "showPrices": true
}/*EDITMODE-END*/;

const VIEW_TO_PATH = Object.freeze({
  home: "/",
  servicios: "/servicios",
  agendar: "/agendar",
  nosotros: "/nosotros",
});

const PATH_TO_VIEW = Object.freeze(
  Object.fromEntries(Object.entries(VIEW_TO_PATH).map(([view, path]) => [path, view]))
);

const normalizePath = (pathname = "/") => {
  const clean = pathname.replace(/\/+$/, "");
  return clean === "" ? "/" : clean.toLowerCase();
};

const HOSTED_BASE_PATH = "/japsfiter";

const resolveBasePath = () => {
  const normalizedPath = normalizePath(window.location.pathname);
  if (window.location.hostname === "japs.ing") return HOSTED_BASE_PATH;
  if (normalizedPath === HOSTED_BASE_PATH || normalizedPath.startsWith(`${HOSTED_BASE_PATH}/`)) {
    return HOSTED_BASE_PATH;
  }
  return "";
};

const BASE_PATH = resolveBasePath();

const withBasePath = (path) => {
  if (!BASE_PATH) return path;
  return path === "/" ? `${BASE_PATH}/` : `${BASE_PATH}${path}`;
};

const stripBasePath = (pathname) => {
  const normalizedPath = normalizePath(pathname);
  if (!BASE_PATH) return normalizedPath;
  if (normalizedPath === BASE_PATH) return "/";
  if (normalizedPath.startsWith(`${BASE_PATH}/`)) {
    const strippedPath = normalizedPath.slice(BASE_PATH.length);
    return strippedPath === "" ? "/" : strippedPath;
  }
  return normalizedPath;
};

const viewToPath = (view) => withBasePath(VIEW_TO_PATH[view] || VIEW_TO_PATH.home);
const pathToView = (pathname) => PATH_TO_VIEW[stripBasePath(pathname)] || "home";

function App() {
  const [view, setViewState] = useState(() => pathToView(window.location.pathname));
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [aiOpen, setAiOpen] = useState(false);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "instant" });
  }, [view]);

  useEffect(() => {
    const currentPath = window.location.pathname;
    const resolvedView = pathToView(currentPath);
    const canonicalPath = viewToPath(resolvedView);
    if (currentPath !== canonicalPath) {
      window.history.replaceState({ view: resolvedView }, "", canonicalPath);
    }
    setViewState(resolvedView);
  }, []);

  useEffect(() => {
    const onPopState = () => setViewState(pathToView(window.location.pathname));
    window.addEventListener("popstate", onPopState);
    return () => window.removeEventListener("popstate", onPopState);
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute("data-dir", tweaks.direction);
    document.documentElement.style.setProperty("--accent", tweaks.accent);
  }, [tweaks]);

  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  useEffect(() => {
    const onOpen = () => setAiOpen(true);
    window.addEventListener("open-ai-chat", onOpen);
    return () => window.removeEventListener("open-ai-chat", onOpen);
  }, []);

  useEffect(() => {
    const targets = Array.from(
      document.querySelectorAll("main .section, main .hero-float, footer.footer")
    );
    if (targets.length === 0) return;

    targets.forEach((el, idx) => {
      el.classList.add("scroll-reveal");
      el.style.setProperty("--reveal-delay", `${(idx % 4) * 40}ms`);
    });

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReducedMotion || !("IntersectionObserver" in window)) {
      targets.forEach((el) => el.classList.add("is-visible"));
      return;
    }

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        });
      },
      { threshold: 0.16, rootMargin: "0px 0px -8% 0px" }
    );

    targets.forEach((el) => {
      const alreadyInView = el.getBoundingClientRect().top <= window.innerHeight * 0.92;
      if (alreadyInView) {
        el.classList.add("is-visible");
      } else {
        observer.observe(el);
      }
    });

    return () => observer.disconnect();
  }, [view]);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const setView = (nextView, opts = {}) => {
    const safeView = VIEW_TO_PATH[nextView] ? nextView : "home";
    const nextPath = viewToPath(safeView);
    if (window.location.pathname !== nextPath) {
      const historyMethod = opts.replace ? "replaceState" : "pushState";
      window.history[historyMethod]({ view: safeView }, "", nextPath);
    }
    setViewState(safeView);
  };

  return (
    <>
      <Nav view={view} setView={setView}/>
      <main>
        <div className="view" data-screen-label={view === "home" ? "Home" : view === "servicios" ? "Servicios" : view === "agendar" ? "Agendar" : "Nosotros"} style={{ display: "block" }}>
          {view === "home" && <HomeView setView={setView} dir={tweaks.direction}/>}
          {view === "servicios" && <ServicesView setView={setView}/>}
          {view === "agendar" && <AgendarView setView={setView}/>}
          {view === "nosotros" && <NosotrosView setView={setView}/>}
        </div>
      </main>
      <Footer/>
      <WAFloat/>
      <AIChatButton onOpen={() => setAiOpen(true)}/>
      <AIChat open={aiOpen} onClose={() => setAiOpen(false)} setView={setView}/>

      {tweaksOpen && (
        <div className="tweaks open">
          <h4>Dirección</h4>
          <div className="tweaks__seg" style={{ width: "100%" }}>
            <button className={tweaks.direction === "a" ? "on" : ""} onClick={() => updateTweak("direction", "a")} style={{ flex: 1 }}>A · Editorial</button>
            <button className={tweaks.direction === "b" ? "on" : ""} onClick={() => updateTweak("direction", "b")} style={{ flex: 1 }}>B · Utility</button>
          </div>
          <div className="tweaks__row">
            <span>Color acento</span>
            <div className="row gap-8">
              {["#F5A623", "#5BE9B9", "#FF6B3D", "#B388FF"].map(c => (
                <button key={c} onClick={() => updateTweak("accent", c)} aria-label={c}
                  style={{ width: 22, height: 22, borderRadius: 999, background: c, border: tweaks.accent === c ? "2px solid var(--ink-900)" : "1px solid var(--border)", cursor: "pointer" }}/>
              ))}
            </div>
          </div>
          <div className="tweaks__row">
            <span>Vista actual</span>
            <select value={view} onChange={e => setView(e.target.value)} style={{ padding: "4px 8px", borderRadius: 6, border: "1px solid var(--border)" }}>
              <option value="home">Home</option>
              <option value="servicios">Servicios</option>
              <option value="agendar">Agendar</option>
              <option value="nosotros">Nosotros</option>
            </select>
          </div>
          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 10, paddingTop: 10, borderTop: "1px dashed var(--border)" }}>
            Tip: prueba ambas direcciones en cada vista.
          </div>
        </div>
      )}
    </>
  );
}

// NosotrosView is loaded from components/nosotros.jsx

// Wait for all babel scripts to finish transpiling and attach to window
const mount = () => {
  if (!window.HomeView || !window.ServicesView || !window.AgendarView || !window.NosotrosView || !window.Nav) {
    return setTimeout(mount, 50);
  }
  const root = ReactDOM.createRoot(document.getElementById("app"));
  root.render(<App/>);
};
mount();
</script>
</body>
</html>
